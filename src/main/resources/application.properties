spring.application.name=audit-filter-logback-demo

# Apache Artemis (embedded broker for audit logs)
spring.artemis.mode=embedded
spring.artemis.embedded.enabled=true
spring.artemis.embedded.queues=audit-log
spring.artemis.embedded.server-id=0
# Avoid file I/O and lock files that can fail in some environments
spring.artemis.embedded.persistent=false

# To see why Artemis/JMS might not start, uncomment and run; then check logs for Artemis/JMS:
# logging.level.org.springframework.boot.artemis=DEBUG
# logging.level.org.springframework.jms=DEBUG
