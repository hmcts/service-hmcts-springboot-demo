spring.application.name=audit-filter-logback-demo

# Apache Artemis: connect to an external broker (supply connection details).
spring.artemis.mode=native
# Required: set broker URL via env (SPRING_ARTEMIS_BROKER_URL) or override, e.g. tcp://localhost:61616
spring.artemis.broker-url=${SPRING_ARTEMIS_BROKER_URL:tcp://localhost:61616}
