name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  Test-Modules:
    name: Test ${{ matrix.module }}
    strategy:
      matrix:
        module: [ actuator-demo,
                  audit-filter-demo,
                  auth-filter-demo,
                  json-mapper-demo,
                  jwt-token-demo,
                  exception-handling-demo,
                  openapi-client-demo,
          # clock-demo - Not work in pipeline. Oddly
                  postgres-lock,
                  postgres-springboot4,
                  servicebus-retry-demo,
                  servicebus-queue-demo,
                  servicebus-topic-demo ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Module tests
        run: |
          env
          echo "APIHUB_ORGANISATION : \"${APIHUB_ORGANISATION}\""
          echo "AZURE_STORAGE_CONNECTION_STRING1 is set to \"${AZURE_STORAGE_CONNECTION_STRING1}\""
          echo "AZURE_STORAGE_CONNECTION_STRING2 is set to \"${AZURE_STORAGE_CONNECTION_STRING2}\""
          cd ${{ matrix.module }}
          pwd
          ./gradlew clean test
          cd ..


