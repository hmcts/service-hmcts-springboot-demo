openapi: 3.0.3
info:
  title: Products API
  description: |
    A sample REST API for managing products and inventory.
    Imported into Azure API Management to demonstrate the Developer Portal catalogue.
  version: "1.0"
  contact:
    name: Colin Greenwood
    email: colingreenwood@scrumconnect.com

servers:
  - url: https://colin-apim.azure-api.net/products

security:
  - apiKeyHeader: []
  - apiKeyQuery: []

tags:
  - name: Products
    description: CRUD operations on products
  - name: Inventory
    description: Stock level operations

paths:
  /products:
    get:
      tags: [Products]
      operationId: listProducts
      summary: List all products
      description: Returns a paginated list of all products.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
              example:
                items:
                  - id: "prod-001"
                    name: "Widget A"
                    description: "A high quality widget"
                    price: 9.99
                    category: "widgets"
                    stock: 150
                page: 1
                pageSize: 20
                total: 1
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Products]
      operationId: createProduct
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
            example:
              name: "Widget B"
              description: "Another fine widget"
              price: 14.99
              category: "widgets"
              stock: 50
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
        example: "prod-001"

    get:
      tags: [Products]
      operationId: getProduct
      summary: Get a product by ID
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Products]
      operationId: updateProduct
      summary: Update a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Products]
      operationId: deleteProduct
      summary: Delete a product
      responses:
        "204":
          description: Product deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{productId}/inventory:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Inventory]
      operationId: getInventory
      summary: Get inventory level for a product
      responses:
        "200":
          description: Inventory details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"
              example:
                productId: "prod-001"
                stock: 150
                reserved: 10
                available: 140
                lastUpdated: "2026-05-14T09:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      in: header
      name: Ocp-Apim-Subscription-Key
    apiKeyQuery:
      type: apiKey
      in: query
      name: subscription-key

  schemas:
    Product:
      type: object
      required: [id, name, price, category]
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
          minimum: 0
        category:
          type: string
        stock:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    ProductRequest:
      type: object
      required: [name, price, category]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
          minimum: 0
        category:
          type: string
        stock:
          type: integer
          minimum: 0
          default: 0

    ProductListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    Inventory:
      type: object
      properties:
        productId:
          type: string
        stock:
          type: integer
        reserved:
          type: integer
        available:
          type: integer
        lastUpdated:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "BAD_REQUEST"
            message: "Invalid input"
    Unauthorized:
      description: Missing or invalid subscription key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "UNAUTHORIZED"
            message: "Access denied due to missing subscription key"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "NOT_FOUND"
            message: "The requested resource was not found"
