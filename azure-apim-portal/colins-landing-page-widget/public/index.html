<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colins Landing Page Widget</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }

    .widget {
      background: white;
      border-radius: 8px;
      padding: 2rem;
      max-width: 600px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .widget__title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .widget__subtitle {
      font-size: 1rem;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .widget__links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .widget__link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      text-decoration: none;
      color: #0078d4;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .widget__link:hover {
      background: #e8f4fd;
      border-color: #0078d4;
    }

    .widget__link-icon {
      font-size: 1.25rem;
    }

    .widget__link-text {
      flex: 1;
    }

    .widget__link-desc {
      display: block;
      font-size: 0.8rem;
      color: #888;
      font-weight: 400;
      margin-top: 0.1rem;
    }
  </style>
</head>
<body>
  <div class="widget">
    <h2 class="widget__title">Welcome to the API Portal</h2>
    <p class="widget__subtitle">Explore, test, and integrate with our APIs.</p>

    <div class="widget__links">
      <a class="widget__link" href="/apis">
        <span class="widget__link-icon">📋</span>
        <span class="widget__link-text">
          Browse APIs
          <span class="widget__link-desc">View the full API catalogue and documentation</span>
        </span>
      </a>
      <a class="widget__link" href="/profile">
        <span class="widget__link-icon">🔑</span>
        <span class="widget__link-text">
          Get a Subscription Key
          <span class="widget__link-desc">Sign up or sign in to request access</span>
        </span>
      </a>
      <a class="widget__link" href="https://github.com/hmcts" target="_blank" rel="noopener">
        <span class="widget__link-icon">📦</span>
        <span class="widget__link-text">
          HMCTS GitHub
          <span class="widget__link-desc">Browse source code and OpenAPI specs</span>
        </span>
      </a>
    </div>
  </div>

  <script type="module" src="../dist/index.js"></script>
</body>
</html>
