<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colins Landing Page Widget – editor</title>
  <link rel="stylesheet" href="./styles/editor.scss">
  <script type="module">
    import initialize, {onChange} from "./editor"
    initialize()
    window.onChange = onChange
  </script>
</head>
<body>
<fieldset class="form flex flex-item flex-item-grow no-overflow">
  <div class="form-group">
    <label class="form-label" for="heading">Heading</label>
    <div class="input-group">
      <input id="heading" class="form-control" type="text" oninput="onChange({heading: this.value})" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label" for="subtitle">Subtitle</label>
    <div class="input-group">
      <input id="subtitle" class="form-control" type="text" oninput="onChange({subtitle: this.value})" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label" for="githubLink">GitHub URL</label>
    <div class="input-group">
      <input id="githubLink" class="form-control" type="text" oninput="onChange({githubLink: this.value})" />
    </div>
  </div>
</fieldset>
</body>
</html>
